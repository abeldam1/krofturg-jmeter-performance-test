image: eclipse-temurin:17-jdk

definitions:
  caches:
    jmeter: ~/.jmeter-cache

  steps:
    - step: &run-jmeter
        name: Run JMeter Performance Test

        caches:
          - jmeter

        script:
          # Install required packages
          - apt-get update
          - apt-get install -y curl tar

          # Create cache directory
          - mkdir -p ~/.jmeter-cache

          # Download JMeter if not already cached
          - |
            if [ ! -f ~/.jmeter-cache/apache-jmeter-5.6.3.tgz ]; then
              curl -L https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz \
                -o ~/.jmeter-cache/apache-jmeter-5.6.3.tgz
            fi

          # Extract JMeter
          - tar -xzf ~/.jmeter-cache/apache-jmeter-5.6.3.tgz

          # Configure PATH
          - export JMETER_HOME=$(pwd)/apache-jmeter-5.6.3
          - export PATH=$JMETER_HOME/bin:$PATH

          # Verify installation
          - jmeter --version

          # Use defaults if variables are not supplied
          - export USERS=${USERS:-1}
          - export RAMP_UP=${RAMP_UP:-5}
          - export DURATION=${DURATION:-60}

          # Display execution settings
          - echo "Users=$USERS"
          - echo "RampUp=$RAMP_UP"
          - echo "Duration=$DURATION"

          # Create results folder
          - mkdir -p results

          # Remove previous outputs
          - rm -f results/Krofturg.jtl
          - rm -f results/Krofturg.csv
          - rm -f results/jmeter.log
          - rm -rf results/html-report

          # Execute JMeter
          - |
            jmeter \
              -n \
              -t Krofturg.jmx \
              -Jusers=$USERS \
              -Jrampup=$RAMP_UP \
              -Jduration=$DURATION \
              -l results/Krofturg.jtl \
              -j results/jmeter.log \
              -e \
              -o results/html-report

          # Create CSV copy
          - cp results/Krofturg.jtl results/Krofturg.csv

        artifacts:
          - results/**

pipelines:
  default:
    - step: *run-jmeter

  custom:
    JMeter-Performance-Test:
      - variables:
          - name: USERS
            default: "1"

          - name: RAMP_UP
            default: "5"

          - name: DURATION
            default: "60"

      - step: *run-jmeter
