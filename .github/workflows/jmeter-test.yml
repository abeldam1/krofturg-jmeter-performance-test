name: JMeter Performance Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  jm-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install JMeter
        run: |
          sudo apt-get update
          sudo apt-get install -y jmeter

      # Updated to use your specific file: Krofturg.jmx
      - name: Run JMeter Test
        run: |
          mkdir jmeter-reports
          jmeter -n -t Krofturg.jmx -l results.jtl -e -o jmeter-reports

      # This ensures the HTML report downloads even if the test fails
      - name: Upload JMeter HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-performance-report
          path: jmeter-reports/
